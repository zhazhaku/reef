services:
  # ─────────────────────────────────────────────
  # Reef Agent (one-shot query) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml run --rm reef-agent -m "Hello"
  # ─────────────────────────────────────────────
  reef-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: reef-agent-full
    profiles:
      - agent
    volumes:
      - ../config/config.json:/root/.reef/config.json:ro
      - reef-workspace:/root/.reef/workspace
      - reef-npm-cache:/root/.npm # npm cache for faster MCP server installs
    entrypoint: ["reef", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # Reef Gateway (Long-running Bot) - Full MCP Support
  #   docker compose -f docker/docker-compose.full.yml --profile gateway up
  # ─────────────────────────────────────────────
  reef-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.full
    container_name: reef-gateway-full
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ../config/config.json:/root/.reef/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - reef-workspace:/root/.reef/workspace
      # NPM cache for faster MCP server installs
      - reef-npm-cache:/root/.npm
    command: ["gateway"]

volumes:
  reef-workspace:
  reef-npm-cache: # Cache npm packages to speed up MCP server installations
