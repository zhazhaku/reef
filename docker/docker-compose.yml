services:
  # ─────────────────────────────────────────────
  # Reef Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm reef-agent -m "Hello"
  # ─────────────────────────────────────────────
  reef-agent:
    image: docker.io/sipeed/reef:latest
    container_name: reef-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.reef
    entrypoint: ["reef", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # Reef Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml --profile gateway up
  # ─────────────────────────────────────────────
  reef-gateway:
    image: docker.io/sipeed/reef:latest
    container_name: reef-gateway
    restart: unless-stopped
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.reef

  # ─────────────────────────────────────────────
  # Reef Launcher (Web Console + Gateway)
  #   docker compose -f docker/docker-compose.yml --profile launcher up
  # ─────────────────────────────────────────────
  reef-launcher:
    image: docker.io/sipeed/reef:launcher
    container_name: reef-launcher
    restart: unless-stopped
    profiles:
      - launcher
    environment:
      - REEF_GATEWAY_HOST=0.0.0.0
      # Set a fixed dashboard token instead of a random one each restart.
      # If not set, a random token is generated and printed to the console on startup.
      #- REEF_LAUNCHER_TOKEN=your-secret-token-here
    ports:
      - "18800:18800"
      - "18790:18790"
    volumes:
      - ./data:/root/.reef
