<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reef — Multi-Agent Dashboard</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <!-- Sidebar overlay (mobile) -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo">🦞</span>
            <span class="sidebar-title">Reef</span>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section-label">Overview</div>
            <a href="#/" class="nav-item active" data-page="dashboard">
                <span class="nav-icon">📊</span> Dashboard
            </a>
            <a href="#/board" class="nav-item" data-page="board">
                <span class="nav-icon">📋</span> Board
            </a>
            <a href="#/activity" class="nav-item" data-page="activity">
                <span class="nav-icon">📰</span> Activity
            </a>

            <div class="nav-section-label">Collaborate</div>
            <a href="#/chatroom" class="nav-item" data-page="chatroom">
                <span class="nav-icon">💬</span> Chatroom
            </a>
            <a href="#/clients" class="nav-item" data-page="clients">
                <span class="nav-icon">🤖</span> Clients
            </a>
            <a href="#/tasks" class="nav-item" data-page="tasks">
                <span class="nav-icon">📝</span> Tasks
            </a>

            <div class="nav-section-label">System</div>
            <a href="#/evolution" class="nav-item" data-page="evolution">
                <span class="nav-icon">🧬</span> Evolution
            </a>
            <a href="#/hermes" class="nav-item" data-page="hermes">
                <span class="nav-icon">⚙️</span> Hermes
            </a>
            <a href="#/config" class="nav-item" data-page="config">
                <span class="nav-icon">🔧</span> Config
            </a>
            <a href="#/monitoring" class="nav-item" data-page="monitoring">
                <span class="nav-icon">📡</span> Monitoring
            </a>
        </nav>
        <div class="sidebar-footer">
            Reef v2.1 · Hermes UI
        </div>
    </aside>

    <!-- Main area -->
    <div class="main-area">
        <!-- Topbar -->
        <header class="topbar">
            <div class="topbar-left">
                <button id="hamburger" class="hamburger">☰</button>
                <span id="topbar-breadcrumb" class="topbar-breadcrumb">Dashboard</span>
            </div>
            <div class="topbar-right">
                <div class="sse-indicator">
                    <span id="sse-dot" class="sse-dot"></span>
                    <span id="sse-label">Connecting...</span>
                </div>
                <span class="hermes-mode-badge" id="hermes-mode-badge">Coordinator</span>
                <button id="theme-toggle" class="btn-icon" title="Toggle theme">☀️</button>
            </div>
        </header>

        <!-- Page content (rendered by JS) -->
        <main id="page-content" class="content">
            <!-- Pages inject content here -->
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/lib/chart.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/board.js"></script>
    <script src="js/chatroom.js"></script>
    <script src="js/clients.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/evolution.js"></script>
    <script src="js/hermes.js"></script>
    <script src="js/config.js"></script>
    <script src="js/activity.js"></script>
    <script src="js/monitoring.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
